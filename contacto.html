<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Mi Sitio</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

        <menu-navegacion></menu-navegacion>

    <main>
        <h1>Contáctanos</h1>
        <form id="formContacto">
            <label>Nombre:</label>
            <input type="text" placeholder="Tu nombre" required>
            
            <label>Correo:</label>
            <input type="email" placeholder="tu@correo.com" required>
            
            <label>Mensaje:</label>
            <textarea rows="4" placeholder="¿En qué puedo ayudarte?"></textarea>
            
            <button type="submit" style="background: #333;">Enviar Mensaje</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
